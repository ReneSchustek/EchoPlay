name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (.NET 10 / Windows)
    runs-on: windows-latest

    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v5

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Abhängigkeiten wiederherstellen
        run: dotnet restore EchoPlay.slnx

      - name: Build (Solution, App wird per Projekt-Mapping als x64 gebaut)
        run: dotnet build EchoPlay.slnx --no-restore

      - name: Tests
        run: dotnet test EchoPlay.slnx --no-build --verbosity normal

      - name: Security-Audit
        run: dotnet list EchoPlay.slnx package --vulnerable --include-transitive
        continue-on-error: true
