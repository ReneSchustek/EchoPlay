name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Zum Anlegen des Releases und Hochladen der Setup.exe.
permissions:
  contents: write

jobs:
  build-release:
    name: Build + Test + Package (Release / x64)
    runs-on: windows-latest

    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v5

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Abhängigkeiten wiederherstellen
        run: dotnet restore EchoPlay.slnx

      - name: Security-Audit (hart)
        run: dotnet list package --vulnerable --include-transitive

      # PublishReadyToRun=false nur im Gate-Build: Die App wird über ihr Publish-Profil
      # schon hier mit RID win-x64 gebaut, wodurch R2R triggert — dessen Runtime-Package
      # steckt aber nicht im RID-losen restore (NETSDK1094). Das echte R2R läuft im
      # publish-setup.ps1-Schritt (eigener RID-Restore). Der Gate-Build braucht nur
      # Kompilierung + Zero-Warning, kein R2R.
      - name: Build Release (Solution, App wird per Projekt-Mapping als x64 gebaut)
        run: dotnet build EchoPlay.slnx -c Release --no-restore -p:PublishReadyToRun=false

      - name: Tests
        run: dotnet test EchoPlay.slnx -c Release --no-build --verbosity normal

      - name: Inno Setup bereitstellen
        run: choco install innosetup -y --no-progress

      - name: Version bestimmen (Tag oder VersionPrefix)
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like 'refs/tags/v*') {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $props = Get-Content Directory.Build.props -Raw
            $version = [regex]::Match($props, '<VersionPrefix>([^<]+)</VersionPrefix>').Groups[1].Value.Trim()
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      # Derselbe erprobte Weg wie lokal (DRY): self-contained Publish mit den korrekten
      # Flags (WindowsPackageType=None / WindowsAppSDKSelfContained) plus Inno-Setup-Kompilierung.
      # Kein --no-build -> kein NETSDK1094 (ReadyToRun findet das RID-Runtime-Package).
      - name: Self-contained Publish + Setup.exe kompilieren
        shell: pwsh
        run: ./tools/publish-setup.ps1 -Version '${{ steps.version.outputs.version }}' -Distribution "$env:GITHUB_WORKSPACE\publish-dist"

      - name: SHA-256 der Setup.exe berechnen
        id: hash
        shell: pwsh
        run: |
          $setup = "dist/EchoPlay-Setup-v${{ steps.version.outputs.version }}.exe"
          if (-not (Test-Path $setup)) { throw "Setup.exe nicht gefunden: $setup" }
          $hash = (Get-FileHash -LiteralPath $setup -Algorithm SHA256).Hash
          "hash=$hash" >> $env:GITHUB_OUTPUT
          "setup=$setup" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $hash"

      - name: Setup.exe als Workflow-Artefakt sichern
        uses: actions/upload-artifact@v6
        with:
          name: EchoPlay-Setup-v${{ steps.version.outputs.version }}
          path: ${{ steps.hash.outputs.setup }}

      - name: GitHub-Release veröffentlichen
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            EchoPlay ${{ github.ref_name }} — selbstinstallierendes Setup für Windows 10/11 (x64).

            Keine vorinstallierte Runtime nötig: .NET und Windows App SDK sind im Setup gebündelt.

            **Integritätsprüfung** — SHA-256 der Setup.exe (der eingebaute Update-Prüfer verifiziert die heruntergeladene Datei gegen diesen Wert):

            SHA256: ${{ steps.hash.outputs.hash }}
          files: ${{ steps.hash.outputs.setup }}
