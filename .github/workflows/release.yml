name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-release:
    name: Build + Test + Package (Release / x64)
    runs-on: windows-latest

    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v5

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Abhängigkeiten wiederherstellen
        run: dotnet restore EchoPlay.slnx

      - name: Security-Audit (hart)
        run: dotnet list package --vulnerable --include-transitive

      - name: Build Release (Solution, App wird per Projekt-Mapping als x64 gebaut)
        run: dotnet build EchoPlay.slnx -c Release --no-restore

      - name: Tests
        run: dotnet test EchoPlay.slnx -c Release --no-build --verbosity normal

      - name: Publish MSIX (unpackaged, win-x64)
        run: dotnet publish src/EchoPlay.App/EchoPlay.App.csproj -c Release -r win-x64 -p:Platform=x64 --self-contained --no-build -o publish

      - name: Release-Artefakt hochladen
        uses: actions/upload-artifact@v6
        with:
          name: EchoPlay-${{ github.ref_name }}-win-x64
          path: publish/

      - name: GitHub-Release-Draft erstellen
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          body: |
            EchoPlay ${{ github.ref_name }}

            **Manueller Smoke-Test und Code-Signing vor Promotion erforderlich.**

            Siehe `.ai/operations/release-checklist.md` §6–§8.
          files: |
            publish/**/*
